apiVersion: apps/v1
kind: Deployment
metadata:
  name: stagepass
spec:
  replicas: 1
  selector:
    matchLabels:
      # app: stagepass というラベルを付与した Pod を管理の対象にする
      app: stagepass
  # template 以下は Deployment が作成する Pod のテンプレート
  template:
    metadata:
      labels:
        # 作成する Pod に app: stagepass というラベルを付与する
        app: stagepass
    spec:
      containers:
        - name: stagepass
          # ビルド済みのイメージをタグを元に参照する
          image: stagepass:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            # 8080 番のポートを http という名前で公開する
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              # http(8080番ポート)の/healthz にアクセス
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              # http(8080番ポート)の/healthz にアクセス
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: stagepass
spec:
  # app: stagepass というラベルを持つ Pod を転送先にする
  selector:
    app: stagepass
  ports:
    - port: 80
      # Pod 側の http(8080番ポート)を指定
      # Service の80番ポートに来たリクエストを転送する
      targetPort: http
  type: ClusterIP